# configs/botsort_side.yaml
# Optimized for Side Window (lateral transition perspective)

tracker_type: botsort
track_high_thresh: 0.45
track_low_thresh: 0.12    # Lower threshold since side view frames have shorter vehicle visibility
new_track_thresh: 0.48
track_buffer: 30          # Shorter buffer since side transition is fast
match_thresh: 0.65        # Lower match threshold to tolerate high horizontal motion displacement
cmc_method: sparseOptFlow
with_reid: False
proximity_thresh: 0.50
appearance_thresh: 0.25
