# configs/botsort_front.yaml
# Optimized for Front Window (dashboard/windshield perspective)

tracker_type: botsort
track_high_thresh: 0.45
track_low_thresh: 0.15
new_track_thresh: 0.50
track_buffer: 45
match_thresh: 0.75        # Higher IoU threshold is reliable from front perspective
cmc_method: sparseOptFlow
with_reid: False
proximity_thresh: 0.50
appearance_thresh: 0.25
