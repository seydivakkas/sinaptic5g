# Kanonik model envanteri. Performans değeri içermez; ölçümler model kartına gider.
mobile:
  runtime: litert_tflite
  delegate: nnapi
  model_path: android/app/src/main/assets/yolov8n.tflite
  artifact_status: EKSIK

team_gpu:
  runtime_candidates: [onnxruntime_gpu, tensorrt]
  model_path: models/yolov8l_tripwire.onnx
  artifact_status: EKSIK
  deployment_name: team_gpu
  operator_mec_confirmed: false

alpr:
  detector_path: models/plate_detector.onnx
  recognizer: crnn_ctc
  recognizer_path: models/plate_crnn.onnx
  artifact_status: EKSIK
  plate_regex: '^(0[1-9]|[1-7][0-9]|8[01])([A-Z][0-9]{4,5}|[A-Z]{2}[0-9]{3,4}|[A-Z]{3}[0-9]{2,3})$'

temporal_behavior:
  model_path: models/temporal_behavior.onnx
  artifact_status: EKSIK
  output_classes:
    - normal_surus
    - sigara_icme
    - telefonla_konusma
    - sag_sol_bakis
    - dikkatsizlik

tracking:
  algorithm: iou_kalman
  reid_enabled: false
  primary_vehicle_policy: valid_plate_then_visibility_then_confidence_then_first_seen

evidence:
  required_status_for_published_kpi: OLCULDU
  current_model_kpi_status: BILDIRILDI-DOGRULANMADI

