#
# Faz 3 — DENEYSEL: YOLOv8l büyük model deneyi
# UYARI: Bu config DENEYSEL. Üretim modeli detector_v3 / models/detector.onnx
# KESİNLİKLE KILITLIDIR ve bu config tarafından ETKİLENMEZ.
#
# YOLOv8l neden deneniyor:
#   - YOLOv8m'e kıyasla ~2x parametre
#   - Düşük destekli sınıflar (teknocan, bilgisayar, emniyet_kemeri) için potansiyel iyileşme
#   - CPU latency artışı riski → FTR budget constraint dikkat
#
# GPU gereksinim: 12GB+ VRAM önerilir (24GB için batch=32)
# Tahmini süre: ~8-12 saat (RTX 4090 / A100)
# CPU smoke-run: epochs=1, batch=2, imgsz=320, device=cpu

# ─── Model ───────────────────────────────────────────────────────────────────
model: yolov8l.pt          # YOLOv8-large — deneysel

# ─── Veri Seti ───────────────────────────────────────────────────────────────
data: configs/data_v4.yaml
# Split: train=0.70, val=0.15, test=0.15, seed=42 (configs/data.yaml senkronize)

# ─── Eğitim Parametreleri ────────────────────────────────────────────────────
epochs: 50
batch: 8                   # Büyük model — 12GB için batch=8
imgsz: 640
device: 0
workers: 4
seed: 42
deterministic: true
patience: 12

# ─── Optimizer ───────────────────────────────────────────────────────────────
optimizer: AdamW
lr0: 0.0005                # Büyük model için daha düşük LR
lrf: 0.01
momentum: 0.937
weight_decay: 0.001        # Büyük model → daha fazla weight decay
warmup_epochs: 5           # Uzun warmup
warmup_momentum: 0.8
warmup_bias_lr: 0.1

amp: true

# ─── Çıktı Yolları ───────────────────────────────────────────────────────────
project: models/runs/experiments
name: yolov8l_experiment
save: true
save_period: 10

# ─── Freeze ──────────────────────────────────────────────────────────────────
freeze: 15                 # L model için daha derin freeze

# ─── Augmentasyon ────────────────────────────────────────────────────────────
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
shear: 2.0
perspective: 0.0005
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.20                # Büyük model daha fazla mixup kaldırır
copy_paste: 0.20
close_mosaic: 15

# ─── Kayıp Fonksiyonu ────────────────────────────────────────────────────────
box: 7.5
cls: 0.5
dfl: 1.5
cls_pw: 0.3

# ─── Karşılaştırma Kriterleri ─────────────────────────────────────────────────
# Bu model detector_v3 ile karşılaştırılacak:
#   - mAP50 >= detector_v3.mAP50 (zorunlu)
#   - mAP50-95 >= detector_v3.mAP50-95 (zorunlu)
#   - FTR CPU latency <= 8s/video (zorunlu — FTR budget)
#   - teknocan + bilgisayar + emniyet_kemeri recall artışı (tercih edilen)
#
# Değerlendirme: scripts/evaluate_detector_v4_full.py (aynı script kullanılır)
# Karşılaştırma raporu: reports/detector_v4_full_vs_detector_v3_comparison.md

# ─── Üretim Güvenlik Notu ────────────────────────────────────────────────────
# Bu model ASLA otomatik olarak production'a alınmaz.
# Yalnızca detector_v3 metriklerini aştığı kanıtlanırsa önerilir.
