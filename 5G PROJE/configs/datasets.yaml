# A source is trainable only when enabled=true and its licence/access evidence is
# recorded here.  Requested sources that cannot legally or technically be fetched
# without a human step stay visible as blocked instead of silently disappearing.
sources:
  detect_laptop:
    enabled: true
    task: detection
    format: yolo
    root: data/raw/detect_laptop
    splits: [train, valid, test]
    label_map: {0: 7}
    url: https://universe.roboflow.com/yolo-8bzqk/detect-laptop-frii1
