  drive_and_act:
    enabled: true
    task: temporal-classification
    format: video-csv
    root: data/external/drive_and_act
    url: https://driveandact.com/
    license: citation-required-academic-dataset
    access: direct-download
    note: RGB video is 5.26 GB; annotations are temporal, not YOLO boxes.
    artifacts:
      iccv_activities_3s.zip: d200ad6a00f2f374cf4cfe54fcf6565bb17eb25961829ae71eb75d89033a760a
      iccv_interior.zip: f1438d31fbc686579e126f9be7c9aa8ec4f4993a07ab26b31d5ef54b73f40db0
      kinect_color.zip: 05fa4cfa6d55f8e2a7abca9e1e7b31ccbbc7497a035f273e620d6672c1946ad3

  vcor:
    enabled: false
    task: color-classification
    format: folder-classification
    url: https://github.com/ArminAmani/Color-Detection
    license: unverified
    access: blocked-no-dataset-archive
    note: Repository describes VCoR but contains neither the image archive nor a dataset licence.

  dmd_official_2026:
    enabled: false
    task: temporal-classification
    format: openlabel-video
    url: https://dmd.vicomtech.org/
    license: academic-use-request
    access: blocked-request-form
    note: Official 2026 release requires name, organisation and email; it is not a YOLO export.

  stanford_cars_196:
    enabled: false
    task: vehicle-model-classification
    format: matlab-bbox-classification
    url: https://ai.stanford.edu/~jkrause/cars/car_dataset.html
    license: unverified
    access: blocked-upstream-404
    note: Official image and annotation URLs return 404; mirrors are not accepted without provenance.

  ufpr_vcr:
    enabled: false
    task: color-classification
    format: folder-classification
    url: https://github.com/Lima001/UFPR-VCR-Dataset
    license: academic-non-commercial-signed-agreement
    access: blocked-signed-agreement
    note: Access requires a signed licence agreement and an institutional email.

  bigailab_trvlp_20k:
    enabled: false
    task: plate-recognition
    format: unknown
    url: null
    license: unverified
    access: blocked-source-not-found
    note: No authoritative dataset page was found for this exact name; an exact URL is required.

  laptop_incar:
    enabled: true
